<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Reader{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 18px;
            line-height: 1.5;
            color: #000;
            background: #fff;
            padding: 12px;
            max-width: 800px;
            margin: 0 auto;
        }
        body.text-size-small { font-size: 16px; }
        body.text-size-small article { font-size: 16px; }
        body.text-size-medium { font-size: 22px; }
        body.text-size-medium article { font-size: 22px; }
        body.text-size-large { font-size: 26px; }
        body.text-size-large article { font-size: 26px; }
        body.text-weight-bold article { font-weight: bold; }
        a {
            color: #000;
            text-decoration: underline;
        }
        .nav {
            display: flex;
            align-items: stretch;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .nav-group {
            display: flex;
            border: 2px solid #000;
            border-radius: 8px;
            overflow: hidden;
        }
        .nav-group a {
            display: block;
            padding: 12px 20px;
            min-height: 48px;
            text-decoration: none;
            border: none;
            border-right: 2px solid #000;
            border-radius: 0;
            font-size: 16px;
            line-height: 24px;
            text-align: center;
        }
        .nav-group a:last-child {
            border-right: none;
        }
        .nav-group a.active {
            background: #000;
            color: #fff;
        }
        .nav-settings {
            display: block;
            padding: 12px 20px;
            min-height: 48px;
            text-decoration: none;
            border: 2px solid #000;
            border-radius: 8px;
            font-size: 16px;
            line-height: 24px;
            text-align: center;
            margin-left: auto;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            min-height: 48px;
            border: 2px solid #000;
            border-radius: 8px;
            background: #fff;
            color: #000;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 16px;
            text-decoration: none;
            cursor: pointer;
            line-height: 24px;
            text-align: center;
        }
        .btn-dark {
            background: #000;
            color: #fff;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .flash {
            padding: 12px;
            border: 2px solid #000;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 16px;
        }
        .article-item {
            padding: 16px 0;
            border-bottom: 1px solid #000;
        }
        .article-item a {
            font-size: 20px;
            font-weight: bold;
            display: block;
            padding: 4px 0;
            min-height: 48px;
        }
        .article-meta {
            font-size: 14px;
            color: #333;
            margin-top: 4px;
        }
        .progress-bar {
            height: 4px;
            background: #ddd;
            margin-top: 8px;
        }
        .progress-fill {
            height: 100%;
            background: #000;
        }
        .pagination {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        article {
            line-height: 1.7;
            -webkit-user-select: text;
            user-select: text;
        }
        article h1, article h2, article h3,
        article h4, article h5, article h6 {
            margin: 24px 0 8px 0;
            line-height: 1.3;
        }
        article p {
            margin: 12px 0;
        }
        article blockquote {
            border-left: 3px solid #000;
            padding-left: 16px;
            margin: 16px 0;
        }
        article pre {
            overflow-x: auto;
            padding: 12px;
            border: 1px solid #000;
            margin: 12px 0;
            font-size: 14px;
        }
        article ul, article ol {
            margin: 12px 0 12px 24px;
        }
        article li {
            margin: 4px 0;
        }
        article a {
            word-break: break-word;
        }
        article table {
            border-collapse: collapse;
            margin: 12px 0;
            width: 100%;
        }
        article th, article td {
            border: 1px solid #000;
            padding: 8px;
            text-align: left;
        }
        .tag-filter {
            padding: 10px 0;
            margin-bottom: 12px;
            border-bottom: 1px solid #000;
            font-size: 16px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
        }
        .tag-list-link {
            display: block;
            padding: 12px 0;
            min-height: 48px;
            border-bottom: 1px solid #000;
            font-size: 18px;
            text-decoration: none;
        }
        .tag-list-link:hover {
            text-decoration: underline;
        }
        body.theme-dark .tag-list-link {
            border-bottom-color: #fff;
        }
        .empty {
            padding: 32px 0;
            text-align: center;
            font-size: 16px;
        }
        .no-content {
            padding: 32px 0;
            text-align: center;
        }
        .no-content a {
            display: inline-block;
            margin-top: 16px;
            padding: 12px 24px;
            min-height: 48px;
            border: 2px solid #000;
        }
        body.theme-dark {
            background: #000;
            color: #fff;
            scrollbar-color: #444 #222;
        }
        body.theme-dark::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }
        body.theme-dark::-webkit-scrollbar-track {
            background: #222;
        }
        body.theme-dark::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 6px;
        }
        body.theme-dark::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        body.theme-dark a { color: #fff; }
        body.theme-dark .nav-group {
            border-color: #fff;
        }
        body.theme-dark .nav-group a {
            border-right-color: #fff;
            color: #fff;
        }
        body.theme-dark .nav-group a.active {
            background: #fff;
            color: #000;
        }
        body.theme-dark .nav-settings {
            border-color: #fff;
            color: #fff;
        }
        body.theme-dark .btn {
            border-color: #fff;
            color: #fff;
            background: #000;
        }
        body.theme-dark .btn-dark {
            background: #fff;
            color: #000;
        }
        body.theme-dark .flash { border-color: #fff; }
        body.theme-dark .article-item { border-bottom-color: #fff; }
        body.theme-dark .article-meta { color: #ccc; }
        body.theme-dark .progress-bar { background: #444; }
        body.theme-dark .progress-fill { background: #fff; }
        body.theme-dark .tag-filter { border-bottom-color: #fff; }
        body.theme-dark .empty { color: #fff; }
        body.theme-dark .no-content a { border-color: #fff; color: #fff; }
        body.theme-dark article blockquote { border-left-color: #fff; }
        body.theme-dark article pre,
        body.theme-dark article th,
        body.theme-dark article td { border-color: #fff; }
        body.theme-dark .settings-option {
            border-color: #fff !important;
            color: #fff;
        }
        body.theme-dark .settings-option span { color: #fff; }
        .option-group {
            display: flex;
            border: 2px solid #000;
            border-radius: 8px;
            overflow: hidden;
        }
        .option-group .settings-option {
            border: none !important;
            border-right: 2px solid #000 !important;
            border-radius: 0;
            flex: 1;
            min-width: 0;
        }
        .option-group .settings-option:last-child {
            border-right: none !important;
        }
        .option-group .settings-option.option-active {
            background: #000;
            color: #fff;
        }
        .option-group .settings-option.option-active span {
            color: #fff;
        }
        body.theme-dark .option-group {
            border-color: #fff;
        }
        body.theme-dark .option-group .settings-option {
            border-right-color: #fff !important;
        }
        body.theme-dark .option-group .settings-option.option-active {
            background: #fff;
            color: #000;
        }
        body.theme-dark .option-group .settings-option.option-active span {
            color: #000;
        }
        body.theme-dark .settings-desc {
            color: #ccc;
        }
        body.theme-dark #highlight-form { border-color: #fff; background: #111; }
        body.theme-dark #highlight-form textarea { background: #222; color: #fff; border: 1px solid #444; }
        body.theme-dark textarea { background: #222; color: #fff; border-color: #444; }
        .settings-option { border-radius: 8px; }
    </style>
</head>
<body class="text-size-{{ text_size }} text-weight-{{ text_weight }} theme-{{ theme }}">
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for msg in messages %}
    <div class="flash">{{ msg }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</body>
</html>
