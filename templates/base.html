<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Reader{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 18px;
            line-height: 1.5;
            color: #000;
            background: #fff;
            padding: 12px;
            max-width: 800px;
            margin: 0 auto;
        }
        a {
            color: #000;
            text-decoration: underline;
        }
        .nav {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .nav a {
            display: block;
            padding: 12px 20px;
            min-height: 48px;
            text-decoration: none;
            border: 2px solid #000;
            font-size: 16px;
            line-height: 24px;
            text-align: center;
        }
        .nav a.active {
            background: #000;
            color: #fff;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            min-height: 48px;
            border: 2px solid #000;
            background: #fff;
            color: #000;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 16px;
            text-decoration: none;
            cursor: pointer;
            line-height: 24px;
            text-align: center;
        }
        .btn-dark {
            background: #000;
            color: #fff;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .flash {
            padding: 12px;
            border: 2px solid #000;
            margin-bottom: 16px;
            font-size: 16px;
        }
        .article-item {
            padding: 16px 0;
            border-bottom: 1px solid #000;
        }
        .article-item a {
            font-size: 20px;
            font-weight: bold;
            display: block;
            padding: 4px 0;
            min-height: 48px;
        }
        .article-meta {
            font-size: 14px;
            color: #333;
            margin-top: 4px;
        }
        .progress-bar {
            height: 4px;
            background: #ddd;
            margin-top: 8px;
        }
        .progress-fill {
            height: 100%;
            background: #000;
        }
        .pagination {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        article {
            font-size: 18px;
            line-height: 1.7;
        }
        article h1, article h2, article h3,
        article h4, article h5, article h6 {
            margin: 24px 0 8px 0;
            line-height: 1.3;
        }
        article p {
            margin: 12px 0;
        }
        article blockquote {
            border-left: 3px solid #000;
            padding-left: 16px;
            margin: 16px 0;
        }
        article pre {
            overflow-x: auto;
            padding: 12px;
            border: 1px solid #000;
            margin: 12px 0;
            font-size: 14px;
        }
        article ul, article ol {
            margin: 12px 0 12px 24px;
        }
        article li {
            margin: 4px 0;
        }
        article a {
            word-break: break-word;
        }
        article table {
            border-collapse: collapse;
            margin: 12px 0;
            width: 100%;
        }
        article th, article td {
            border: 1px solid #000;
            padding: 8px;
            text-align: left;
        }
        .tag-filter {
            padding: 10px 0;
            margin-bottom: 12px;
            border-bottom: 1px solid #000;
            font-size: 16px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
        }
        .article-tags {
            margin-top: 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .article-tags a {
            font-size: 13px;
            padding: 4px 10px;
            border: 1px solid #000;
            text-decoration: none;
        }
        .empty {
            padding: 32px 0;
            text-align: center;
            font-size: 16px;
        }
        .no-content {
            padding: 32px 0;
            text-align: center;
        }
        .no-content a {
            display: inline-block;
            margin-top: 16px;
            padding: 12px 24px;
            min-height: 48px;
            border: 2px solid #000;
        }
    </style>
</head>
<body>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for msg in messages %}
    <div class="flash">{{ msg }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</body>
</html>
