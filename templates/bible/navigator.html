{% extends "base.html" %}

{% block title %}Bible Navigator{% endblock %}

{% block nav %}{% endblock %}

{% block styles %}
<style>
    .bible-page {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    .bible-heading {
        font-size: 28px;
        line-height: 1.2;
        margin: 0 0 20px 0;
    }
    .bible-form {
        margin: 0;
    }
    .bible-field {
        display: block;
        margin: 0 0 16px 0;
    }
    .bible-label {
        display: block;
        font-size: 16px;
        line-height: 1.3;
        margin: 0 0 6px 0;
    }
    .bible-select {
        display: block;
        width: 100%;
        min-height: 48px;
        padding: 10px 12px;
        border: 2px solid #000;
        border-radius: 8px;
        background: #fff;
        color: #000;
        font: 18px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    .bible-action {
        display: inline-block;
        min-height: 48px;
        padding: 12px 24px;
        border: 2px solid #000;
        border-radius: 8px;
        background: #000;
        color: #fff;
        font: 16px/24px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        text-align: center;
        text-decoration: none;
    }
    .theme-dark .bible-select {
        border-color: #fff;
        background: #000;
        color: #fff;
    }
    .theme-dark .bible-action {
        border-color: #fff;
        background: #fff;
        color: #000;
    }
</style>
{% endblock %}

{% block content %}
<main class="bible-page">
    <h1 class="bible-heading">Bible Navigator</h1>
    <form class="bible-form">
        <label class="bible-field" for="translation-select">
            <span class="bible-label">Translation</span>
            <select class="bible-select" id="translation-select" name="translation">
                {% for translation in translations %}
                <option value="{{ translation }}" {% if translation == selected_translation %}selected{% endif %}>{{ translation }}</option>
                {% endfor %}
            </select>
        </label>
        <label class="bible-field" for="book-select">
            <span class="bible-label">Book</span>
            <select class="bible-select" id="book-select" name="book">
                {% for book in books %}
                <option value="{{ book.id }}" {% if book.id == selected_book %}selected{% endif %}>{{ book.name }}</option>
                {% endfor %}
            </select>
        </label>
        <label class="bible-field" for="chapter-select">
            <span class="bible-label">Chapter</span>
            <select class="bible-select" id="chapter-select" name="chapter">
                {% for chapter in chapters %}
                <option value="{{ chapter }}">{{ chapter }}</option>
                {% endfor %}
            </select>
        </label>
        <a class="bible-action" id="go-link" href="/bible/{{ selected_translation }}/{{ selected_book }}/1">Go to Chapter</a>
    </form>
</main>
<script>
    var translationSelect = document.getElementById("translation-select");
    var bookSelect = document.getElementById("book-select");
    var chapterSelect = document.getElementById("chapter-select");
    var goLink = document.getElementById("go-link");

    function updateLink() {
        var translation = translationSelect.value;
        var chapter = chapterSelect.value;
        goLink.href = "/bible/" + translation + "/" + bookSelect.value + "/" + chapter;
    }

    translationSelect.onchange = updateLink;
    document.getElementById('book-select').onchange = function() {
        var t = document.getElementById('translation-select').value;
        var b = this.value;
        window.location.href = '/bible/?translation=' + t + '&book=' + b;
    };
    chapterSelect.onchange = updateLink;
    updateLink();
</script>
{% endblock %}
