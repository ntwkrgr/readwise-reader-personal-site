{% extends "base.html" %}

{% block title %}Bible Navigator{% endblock %}

{% block styles %}
<style>
    .bible-page {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    .bible-heading {
        font-size: 28px;
        line-height: 1.2;
        margin: 0 0 20px 0;
    }
    .bible-form {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        flex-wrap: wrap;
        margin: 0;
    }
    .bible-field {
        display: block;
        flex: 1 1 150px;
        margin: 0;
    }
    .bible-label {
        display: block;
        font-size: 16px;
        line-height: 1.3;
        margin: 0 0 6px 0;
    }
    .bible-select {
        display: block;
        width: 100%;
        min-height: 48px;
        padding: 10px 12px;
        border: 2px solid #000;
        border-radius: 8px;
        background: #fff;
        color: #000;
        font: 18px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    .bible-action {
        display: inline-block;
        min-height: 48px;
        padding: 12px 24px;
        border: 2px solid #000;
        border-radius: 8px;
        background: #000;
        color: #fff;
        font: 16px/24px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        text-align: center;
        text-decoration: none;
        cursor: pointer;
    }
    .theme-dark .bible-select {
        border-color: #fff;
        background: #000;
        color: #fff;
    }
    .theme-dark .bible-action {
        border-color: #fff;
        background: #fff;
        color: #000;
    }
</style>
{% endblock %}

{% block content %}
<main class="bible-page">
    <h1 class="bible-heading">Bible Navigator</h1>
    <form class="bible-form" id="bible-nav-form" action="/bible/{{ selected_translation }}/{{ selected_book }}/{{ selected_chapter }}" method="get">
        <label class="bible-field" for="translation-select">
            <span class="bible-label">Translation</span>
            <select class="bible-select" id="translation-select">
                {% for translation in translations %}
                <option value="{{ translation }}" {% if translation == selected_translation %}selected{% endif %}>{{ translation }}</option>
                {% endfor %}
            </select>
        </label>
        <label class="bible-field" for="book-select">
            <span class="bible-label">Book</span>
            <select class="bible-select" id="book-select">
                {% for book in books %}
                <option value="{{ book.id }}" {% if book.id == selected_book %}selected{% endif %}>{{ book.name }}</option>
                {% endfor %}
            </select>
        </label>
        <label class="bible-field" for="chapter-select">
            <span class="bible-label">Chapter</span>
            <select class="bible-select" id="chapter-select">
                {% for chapter in chapters %}
                <option value="{{ chapter }}"{% if chapter == selected_chapter %} selected{% endif %}>{{ chapter }}</option>
                {% endfor %}
            </select>
        </label>
        <button class="bible-action" id="go-button" type="submit">GO</button>
    </form>
</main>
<script>
    var bookChapterCounts = {{ book_chapter_counts | tojson }};
    var navForm = document.getElementById("bible-nav-form");
    var translationSelect = document.getElementById("translation-select");
    var bookSelect = document.getElementById("book-select");
    var chapterSelect = document.getElementById("chapter-select");

    function navigationPath() {
        var translation = translationSelect.value;
        var chapter = chapterSelect.value;
        return "/bible/" + translation + "/" + bookSelect.value + "/" + chapter;
    }

    function updateFormAction() {
        navForm.action = navigationPath();
    }

    function updateChapterOptions() {
        var maxChapters = bookChapterCounts[bookSelect.value] || 1;
        var currentChapter = parseInt(chapterSelect.value, 10) || 1;
        var selectedChapter = Math.min(currentChapter, maxChapters);
        chapterSelect.innerHTML = "";
        for (var i = 1; i <= maxChapters; i++) {
            var opt = document.createElement("option");
            opt.value = i;
            opt.textContent = i;
            if (i === selectedChapter) opt.selected = true;
            chapterSelect.appendChild(opt);
        }
        updateFormAction();
    }

    translationSelect.onchange = updateFormAction;
    bookSelect.onchange = updateChapterOptions;
    chapterSelect.onchange = updateFormAction;
    updateFormAction();
</script>
{% endblock %}
